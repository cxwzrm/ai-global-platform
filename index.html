<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Global Marketing Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 16px;
            text-align: center;
        }
        .subtitle {
            font-size: 20px;
            color: #bfdbfe;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 32px;
            color: white;
            max-width: 500px;
        }
        .status-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
            font-size: 16px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <h1>AI Global Marketing Platform</h1>
    <p class="subtitle">✅ Vercel 部署成功！</p>
    <div class="card">
        <div class="status-item">
            <span class="status-dot"></span>
            <strong>OpenClaw Gateway:</strong> 运行正常
        </div>
        <div class="status-item">
            <span class="status-dot"></span>
            <strong>服务器:</strong> 43.132.225.232:18789
        </div>
    </div>
</body>
</html>
